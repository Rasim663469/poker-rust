services:
  postgres:
    image: postgres:16-alpine
    container_name: poker-db
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - poker-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  poker-db-data:
